# HSys PostgreSQL 调优（采集负载：持续写入 + 分析端即席查询）
# 由 Dockerfile 以 config_file 方式加载。

# ── 连接 ──
listen_addresses = '*'          # 容器内监听全部网卡；对外暴露由 docker -p 控制
max_connections = 50            # 采集(1写) + server(连接池) + 人工 psql 足够

# ── 内存 ──
shared_buffers = 512MB
work_mem = 16MB
maintenance_work_mem = 256MB    # 建索引/VACUUM
effective_cache_size = 2GB      # 让优化器敢用索引

# ── WAL / 检查点（写多）──
wal_compression = on            # WAL 压缩，降 IO
max_wal_size = 4GB
checkpoint_timeout = 15min

# ── 存储特性 ──
random_page_cost = 1.1          # SSD
default_toast_compression = lz4 # 大字段（events_raw.payload）压缩算法

# ── 时区（分区边界/日志按本地时间；业务时间戳仍是 epoch 毫秒）──
timezone = 'Asia/Shanghai'
log_timezone = 'Asia/Shanghai'

# ── 日志（慢查询排查）──
log_min_duration_statement = 2000
log_line_prefix = '%m [%p] %q%u@%d '
