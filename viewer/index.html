<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>长龙浏览器</title>
<script src="/vendor/echarts.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1115; color: #d7dce3; font: 14px/1.5 "Microsoft YaHei", system-ui, sans-serif; }
  header { padding: 12px 20px; border-bottom: 1px solid #232833; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 17px; color: #fff; }
  .stat { color: #8b94a3; font-size: 13px; }
  .stat b { color: #e8b93d; }
  .filters { padding: 10px 20px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #232833; background: #14171d; position: sticky; top: 0; z-index: 5; }
  select, input { background: #1c212b; color: #d7dce3; border: 1px solid #2c3442; border-radius: 6px; padding: 5px 9px; font-size: 13px; }
  button { background: #2b62c4; color: #fff; border: 0; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  button:hover { background: #3570d8; }
  #list { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #171b23; border: 1px solid #242b38; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
  .card:hover { border-color: #3a4группа458; }
  .card:hover { border-color: #3a4458; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .side { font-weight: 700; padding: 1px 8px; border-radius: 4px; font-size: 13px; }
  .side.B { background: #4c1d1d; color: #ff7b72; }
  .side.P { background: #16324f; color: #79b8ff; }
  .tname { color: #fff; font-weight: 600; }
  .gtype { color: #8b94a3; font-size: 12px; }
  .len { color: #e8b93d; font-weight: 600; }
  .meta { color: #8b94a3; font-size: 12px; }
  .outcome { font-size: 12px; padding: 1px 7px; border-radius: 4px; }
  .outcome.broke { background: #3d2b10; color: #f0b35c; }
  .outcome.censored { background: #2b2f38; color: #9aa3b2; }
  .outcome.open { background: #123f2a; color: #5fd69a; }
  .detail { margin-top: 10px; border-top: 1px dashed #2c3442; padding-top: 10px; }
  .road { display: flex; flex-wrap: wrap; gap: 3px; margin: 8px 0; }
  .dot { width: 16px; height: 16px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; color: #fff; }
  .dot.B { background: #c0392b; }
  .dot.P { background: #2470bd; }
  .dot.T { background: #1e8e5a; }
  .dot.brk { outline: 2px solid #e8b93d; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  th, td { padding: 4px 6px; text-align: right; border-bottom: 1px solid #232833; white-space: nowrap; }
  th { color: #8b94a3; font-weight: 500; }
  td.l, th.l { text-align: left; }
  tr.brk td { background: rgba(232,185,61,.07); }
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 40px; margin: 6px 0; }
  .bar { flex: 1; min-width: 3px; background: #2b62c4; border-radius: 1px 1px 0 0; position: relative; }
  .bar.brk { background: #e8b93d; }
  .more-wrap { text-align: center; padding: 14px; }
  #loading { color: #8b94a3; text-align: center; padding: 30px; }
</style>
</head>
<body>
<header>
  <h1>🐉 长龙浏览器</h1>
  <span class="stat" id="stats">加载中…</span>
  <span class="stat" id="clock"></span>
</header>
<section id="panel-jump" style="margin:10px 20px;background:#171b23;border:1px solid #242b38;border-radius:8px;padding:12px 16px;">
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <b style="color:#e8b93d">⚡ 封盘前最后一跳（头号待验证信号）</b>
    <select id="j-thr" onchange="loadJump()">
      <option value="10000">阈值 1万</option>
      <option value="20000" selected>阈值 2万</option>
      <option value="50000">阈值 5万</option>
    </select>
    <span class="stat" id="j-summary">加载中…</span>
  </div>
  <div id="j-chart" style="margin-top:8px"></div>
  <div class="meta" style="color:#8b94a3;font-size:12px;margin-top:4px">
    口径：封盘前最后一帧押注快照较上一帧单边激增 &gt;阈值（且2倍于对方）。曲线=累计胜率随样本收敛走势；
    稳定在 0.5 以下 = 真"杀大"，回升到 0.5 = 当初的 4/18 只是噪声。
  </div>
</section>
<div class="filters">
  <select id="f-side"><option value="">龙向(全部)</option><option value="B">庄龙</option><option value="P">闲龙</option></select>
  <select id="f-outcome"><option value="">结局(全部)</option><option value="broke">已断</option><option value="censored">删失(掉线/换靴)</option><option value="open">进行中</option></select>
  <select id="f-gtype"><option value="">桌型(全部)</option></select>
  <select id="f-minlen"><option value="0">峰值长度(不限)</option><option value="5">≥5</option><option value="7">≥7</option><option value="9">≥9</option></select>
  <input id="f-q" placeholder="桌名/桌ID" size="12">
  <button onclick="reload(true)">查询</button>
  <label class="stat" style="align-self:center"><input type="checkbox" id="auto" checked style="vertical-align:-2px"> 30s自动刷新</label>
</div>
<div id="list"></div>
<div class="more-wrap"><button id="more" onclick="loadMore()" style="display:none">加载更多</button></div>

<script>
let offset = 0, total = 0;
const $ = id => document.getElementById(id);
const fmtT = ms => { const d = new Date(ms); return d.toTimeString().slice(0,8); };
const fmtDur = ms => { const s = Math.round(ms/1000); return s>=60 ? `${Math.floor(s/60)}分${s%60}秒` : `${s}秒`; };
const OUT = { broke:['✂ 已断','broke'], censored_disconnect:['🔌 掉线','censored'], censored_boot:['🔄 换靴','censored'] };

async function reload(reset) {
  if (reset) { offset = 0; $('list').innerHTML = ''; }
  const p = new URLSearchParams({
    side: $('f-side').value, outcome: $('f-outcome').value,
    game_type: $('f-gtype').value, min_len: $('f-minlen').value,
    q: $('f-q').value, limit: 50, offset });
  const r = await (await fetch('/api/episodes?' + p)).json();
  total = r.total;
  const sel = $('f-gtype');
  if (sel.options.length <= 1) r.game_types.forEach(g => {
    const o = document.createElement('option'); o.textContent = g; sel.appendChild(o); });
  if (reset) $('list').innerHTML = '';
  r.items.forEach(addCard);
  offset += r.items.length;
  $('more').style.display = offset < total ? '' : 'none';
  if (reset && !r.items.length) $('list').innerHTML = '<div id="loading">没有符合条件的长龙</div>';
}
function loadMore() { reload(false); }

function addCard(ep) {
  const div = document.createElement('div');
  div.className = 'card';
  const [ot, oc] = ep.outcome ? (OUT[ep.outcome] || [ep.outcome,'censored']) : ['⏳ 进行中','open'];
  div.innerHTML = `<div class="row">
    <span class="side ${ep.side}">${ep.side==='B'?'庄龙':'闲龙'}</span>
    <span class="tname">${ep.table_name || '桌'+ep.table_id}</span>
    <span class="gtype">${ep.game_type_name}</span>
    <span class="len">${ep.start_length}→${ep.max_length} 连</span>
    <span class="meta">存活 ${ep.max_length-ep.start_length} 局 · ${fmtDur(ep.end_ts-ep.start_ts)}</span>
    <span class="outcome ${oc}">${ot}</span>
    <span class="meta" style="margin-left:auto">${fmtT(ep.start_ts)}</span>
  </div><div class="detail" style="display:none"></div>`;
  div.onclick = () => toggle(div, ep.episode_id);
  $('list').appendChild(div);
}

async function toggle(div, eid) {
  const det = div.querySelector('.detail');
  if (det.style.display !== 'none') { det.style.display = 'none'; return; }
  det.style.display = 'block';
  if (det.dataset.loaded) return;   // 已加载过直接展示，别覆盖
  det.innerHTML = '<span class="meta">加载中…</span>';
  const ep = await (await fetch('/api/episodes/' + eid)).json();
  det.dataset.loaded = 1;
  const rounds = ep.rounds || [];
  const road = rounds.map(r => ({t: r.result[0], brk: r.outcome==='broke'}));
  const maxAmt = Math.max(...rounds.map(r => r.b_amt + r.p_amt), 1);
  det.innerHTML = `
    <div class="road">${road.map(d =>
      `<span class="dot ${d.t}${d.brk?' brk':''}">${d.t==='T'?'和':''}</span>`).join('')}</div>
    <div class="bars" title="每局总池(庄+闲)">${rounds.map(r =>
      `<div class="bar${r.outcome==='broke'?' brk':''}" style="height:${Math.max(6,(r.b_amt+r.p_amt)/maxAmt*100)}%"></div>`).join('')}</div>
    <table><thead><tr>
      <th class="l">时间</th><th>连胜长</th><th>结果</th><th>点数</th>
      <th>庄池</th><th>闲池</th><th>和池</th><th>庄人数</th><th>闲人数</th><th>在线</th>
    </tr></thead><tbody>${rounds.map(r => `
      <tr class="${r.outcome==='broke'?'brk':''}" data-rid="${r.round_id}" style="cursor:pointer" title="点击查看局内资金曲线">
        <td class="l">${fmtT(r.ts_settle)}</td><td>${r.streak_len_before}</td>
        <td>${{B:'庄',P:'闲',T:'和',B6:'庄6'}[r.result]||r.result}</td>
        <td>${r.banker_points}:${r.player_points}</td>
        <td>${(r.b_amt||0).toLocaleString()}</td><td>${(r.p_amt||0).toLocaleString()}</td>
        <td>${(r.t_amt||0).toLocaleString()}</td>
        <td>${r.b_cnt}</td><td>${r.p_cnt}</td><td>${r.online_number ?? '-'}</td>
      </tr>`).join('')}</tbody></table>
    <div class="meta" style="margin-top:6px">金框圆点/金柱 = 断龙那一局；点击任意局行展开局内资金曲线</div>
    <div class="rdetail" style="display:none;margin-top:10px"></div>`;
  det.querySelectorAll('tr[data-rid]').forEach(tr => {
    tr.onclick = e => { e.stopPropagation(); loadRound(det, tr.dataset.rid); };
  });
}

async function loadRound(det, rid) {
  const box = det.querySelector('.rdetail');
  if (box.style.display !== 'none' && box.dataset.rid === rid) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.dataset.rid = rid;
  box.innerHTML = '<span class="meta">加载局内数据…</span>';
  const d = await (await fetch('/api/rounds/' + rid)).json();
  if (d.error) { box.innerHTML = '<span class="meta">未找到该局</span>'; return; }
  const i = d.info, fs = d.frames;
  const RES = {B:'庄',P:'闲',T:'和',B6:'庄6'};
  let html = `<div class="meta" style="margin-bottom:6px">
    <b style="color:#fff">局 ${rid}</b> · ${i.table_name||('桌'+i.table_id)} ·
    ${RES[i.result]||i.result} ${i.banker_points}:${i.player_points} ·
    靴内第${i.boot_index}局 · 荷官 ${i.dealer_name||'-'} · ${fs.length} 帧押注快照</div>`;
  if (!fs.length) { box.innerHTML = html + '<span class="meta">该局无局内帧记录（监控中途进场）</span>'; return; }
  const chartId='rc_'+rid;
  html += `<div id="${chartId}" style="width:100%;height:420px;background:#10141a;border-radius:6px"></div>`;
  const key=[];
  for(let k=1;k<fs.length;k++){
    const prev=fs[k-1].b_amt+fs[k-1].p_amt, cur=fs[k].b_amt+fs[k].p_amt;
    if(prev===0||Math.abs(cur-prev)/Math.max(prev,1)>0.1||k>=fs.length-3) key.push(k);
  }
  html += `<table style="margin-top:6px"><thead><tr><th class="l">时间</th><th>庄池</th><th>闲池</th><th>和池</th><th>庄人数</th><th>闲人数</th><th>和人数</th><th>当局下注</th></tr></thead><tbody>
    ${key.map(k=>{const f=fs[k];return `<tr><td class="l">${fmtT(f.ts)}</td><td>${f.b_amt.toLocaleString()}</td><td>${f.p_amt.toLocaleString()}</td><td>${f.t_amt.toLocaleString()}</td><td>${f.b_cnt}</td><td>${f.p_cnt}</td><td>${f.t_cnt}</td><td>${f.players??'-'}</td></tr>`}).join('')}
  </tbody></table>`;
  box.innerHTML = html;
  // ---- ECharts 双面板：上=金额 下=人数/在线 ----
  const chart = echarts.init(document.getElementById(chartId), null, {renderer:'canvas'});
  const AX = {axisLine:{lineStyle:{color:'#2c3442'}}, axisLabel:{color:'#8b94a3',fontSize:10}, splitLine:{lineStyle:{color:'#1b212b'}}};
  const tt = {trigger:'axis', axisPointer:{type:'cross', label:{backgroundColor:'#2b62c4'}},
              backgroundColor:'#171b23', borderColor:'#2c3442', textStyle:{color:'#d7dce3',fontSize:12},
              valueFormatter:v=>v==null?'-':Number(v).toLocaleString()};
  const L=(name,data,color)=>({name,type:'line',showSymbol:false,data,lineStyle:{width:1.5,color},itemStyle:{color},emphasis:{focus:'series'}});
  const opt = {
    animation:false, backgroundColor:'transparent',
    axisPointer:{link:[{xAxisIndex:'all'}]},
    tooltip: {...tt},
    legend:{textStyle:{color:'#8b94a3',fontSize:11}, top:2, itemWidth:14},
    grid:[{left:70,right:70,top:30,height:'32%'},{left:70,right:70,top:'52%',height:'30%'}],
    xAxis:[
      {type:'time',gridIndex:0,...AX,axisLabel:{show:false}},
      {type:'time',gridIndex:1,...AX,axisLabel:{...AX.axisLabel,formatter:{hour:'{HH}:{mm}:{ss}',minute:'{HH}:{mm}:{ss}',second:'{HH}:{mm}:{ss}',millisecond:'{HH}:{mm}:{ss}'}}}],
    yAxis:[
      {type:'value',gridIndex:0,name:'金额',nameTextStyle:{color:'#8b94a3'},...AX},
      {type:'value',gridIndex:1,name:'人数',nameTextStyle:{color:'#8b94a3'},...AX}],
    dataZoom:[{type:'inside',xAxisIndex:[0,1]},{type:'slider',xAxisIndex:[0,1],height:14,bottom:2,
               borderColor:'#2c3442',backgroundColor:'#14171d',fillerColor:'rgba(43,98,196,.25)',
               textStyle:{color:'#8b94a3',fontSize:9}}],
    series:[
      {...L('庄池',fs.map(f=>[f.ts,f.b_amt]),'#e05252'),xAxisIndex:0,yAxisIndex:0},
      {...L('闲池',fs.map(f=>[f.ts,f.p_amt]),'#4a9ae0'),xAxisIndex:0,yAxisIndex:0},
      {...L('和池',fs.map(f=>[f.ts,f.t_amt]),'#c9a227'),xAxisIndex:0,yAxisIndex:0},
      {...L('庄人数',fs.map(f=>[f.ts,f.b_cnt]),'#a05050'),xAxisIndex:1,yAxisIndex:1},
      {...L('闲人数',fs.map(f=>[f.ts,f.p_cnt]),'#5080a0'),xAxisIndex:1,yAxisIndex:1},
      {...L('和人数',fs.map(f=>[f.ts,f.t_cnt]),'#8a7a30'),xAxisIndex:1,yAxisIndex:1},
      {...L('当局下注人数',fs.map(f=>[f.ts,f.players]),'#c07fd6'),xAxisIndex:1,yAxisIndex:1},
    ]
  };
  if (d.online && d.online.length>1)
    opt.series.push({...L('在线(大厅快照)',d.online.map(o=>[o.ts,o.online]),'#1e8e5a'),xAxisIndex:1,yAxisIndex:1,lineStyle:{width:1.5,color:'#1e8e5a',type:'dashed'}});
  chart.setOption(opt);
  new ResizeObserver(()=>chart.resize()).observe(document.getElementById(chartId));
}

async function stats() {
  const s = await (await fetch('/api/stats')).json();
  $('stats').innerHTML = `共 <b>${s.total}</b> 条龙 · 已断 <b>${s.broke}</b> · 删失 ${s.censored} · 进行中 ${s.open} · 平均存活 <b>${s.avg_survive}</b> 局 / <b>${s.avg_secs}</b> 秒`;
  $('clock').textContent = '数据截至 ' + fmtT(s.range[1] || s.now);
}

async function loadJump() {
  const thr = $('j-thr').value;
  const d = await (await fetch('/api/lastjump?threshold=' + thr)).json();
  const sig = d.total.n >= 30 && d.total.ci[1] < 0.5 ? ' ⚠️ 显著偏低' :
              d.total.n >= 30 && d.total.ci[0] > 0.5 ? ' ⚠️ 显著偏高' : '';
  $('j-summary').innerHTML =
    `累计 <b>${d.total.n}</b> 局 · 重钱方胜 <b>${d.total.wins}</b> · ` +
    `胜率 <b>${(d.total.rate*100).toFixed(1)}%</b> ` +
    `[${(d.total.ci[0]*100).toFixed(1)}~${(d.total.ci[1]*100).toFixed(1)}%]${sig} · ` +
    `庄跳 ${d.side_B.n}局胜${(d.side_B.rate*100).toFixed(0)}% · ` +
    `闲跳 ${d.side_P.n}局胜${(d.side_P.rate*100).toFixed(0)}%`;
  // SVG 累计胜率曲线
  const c = d.curve;
  if (c.length < 2) { $('j-chart').innerHTML = '<span class="meta">样本不足</span>'; return; }
  const W = 900, H = 160, pl = 40, pb = 24, pt = 10, pr = 10;
  const xs = c.map(p => p[0]), ys = c.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = 0, y1 = 1;
  const X = t => pl + (x1 > x0 ? (t - x0) / (x1 - x0) * (W - pl - pr) : 0);
  const Y = v => pt + (1 - (v - y0) / (y1 - y0)) * (H - pt - pb);
  const pts = c.map(p => `${X(p[0]).toFixed(1)},${Y(p[1]).toFixed(1)}`).join(' ');
  $('j-chart').innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;background:#10141a;border-radius:6px">
      <line x1="${pl}" y1="${Y(0.5)}" x2="${W-pr}" y2="${Y(0.5)}" stroke="#4a5568" stroke-dasharray="4 3"/>
      <text x="${W-pr-2}" y="${Y(0.5)-4}" fill="#8b94a3" font-size="10" text-anchor="end">公平线 50%</text>
      <line x1="${pl}" y1="${Y(0)}" x2="${pl}" y2="${Y(1)}" stroke="#2c3442"/>
      <polyline points="${pts}" fill="none" stroke="#e8b93d" stroke-width="1.5"/>
      <text x="${pl+4}" y="${Y(1)+12}" fill="#8b94a3" font-size="10">100%</text>
      <text x="${pl+4}" y="${Y(0)-2}" fill="#8b94a3" font-size="10">0%</text>
      <text x="${pl}" y="${H-6}" fill="#8b94a3" font-size="10">${fmtT(x0)}</text>
      <text x="${W-pr}" y="${H-6}" fill="#8b94a3" font-size="10" text-anchor="end">${fmtT(x1)}</text>
    </svg>`;
}
loadJump();
setInterval(() => { if ($('auto').checked) loadJump(); }, 30000);
reload(true); stats();
setInterval(() => { if ($('auto').checked) { reload(true); stats(); } }, 30000);
</script>
</body>
</html>
